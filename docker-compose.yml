version: "3.0"
services:
  postgres:
   image: postgres:16
   container_name: music_postgres
   environment:
    POSTGRES_USER: admin
    POSTGRES_PASSWORD: password
    POSTGRES_DB: musicdb
   ports:
     - "5432:5432"
   volumes:
     - postgres_data:/var/lib/postgresql/data

  redis:
   image: redis:7-alpine
   container_name: music_redis
   ports:
     - "6379:6379"

  pgadmin:
    image: dpage/pgadmin4
    container_name: music_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
